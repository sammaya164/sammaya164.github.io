---
layout: "default"
---

    <h2>Repositories</h2>
    <ul>
      {% for repository in site.github.public_repositories %}
        <li>
            <a href="{{ repository.html_url }}">{{ repository.name }}</a>
            (<a href="{{ site.github.pages_hostname }}/{{repository.name}}">Pages</a>)<br />
            概要：{{ repository.tagline }}
        </li>
      {% endfor %}
    </ul>
    {{ content }}
